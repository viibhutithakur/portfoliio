<!DOCTYPE html>
<html>

<head>
    <title>HTML Form and Table</title>
</head>

<body>

    <h1>Student Registration Form</h1>

    <form>

        <label>Name:</label>
        <input type="text" value="Vibhu">
        <br><br>

        <label>Password:</label>
        <input type="password">
        <br><br>

        <label>Email:</label>
        <input type="email" value="abc@gmail.com">
        <br><br>

        <label>Phone:</label>
        <input type="tel" value="9876543210">
        <br><br>

        <label>Age:</label>
        <input type="number" value="19">
        <br><br>

        <label>Date of Birth:</label>
        <input type="date">
        <br><br>

        <label>Gender:</label>
        <input type="radio" name="g" value="Male"> Male
        <input type="radio" name="g" value="Female"> Female
        <br><br>

        <label>Hobbies:</label>
        <input type="checkbox" value="Music"> Music
        <input type="checkbox" value="Sports"> Sports
        <input type="checkbox" value="Gaming"> Gaming
        <br><br>

        <label>Favorite Color:</label>
        <input type="color">
        <br><br>

        <label>Range:</label>
        <input type="range">
        <br><br>

        <label>Website:</label>
        <input type="url" value="https://google.com">
        <br><br>

        <label>Upload File:</label>
        <input type="file">
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>

</html>
